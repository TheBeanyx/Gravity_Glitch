<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>The Compiler's Nightmare | Sector 01</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 15px; left: 15px; color: #00d4ff; font-family: monospace; z-index: 100; }
    </style>
</head>
<body>
    <div id="ui">SECTOR_01: <span id="status" style="color:#0f0">STABLE</span></div>
    <canvas id="gameCanvas"></canvas>

    <script src="js/levels.js"></script>
    <script src="js/input.js"></script>
    <script src="js/engine/physics.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>

    <script>
        window.onload = () => {
            try {
                window.game = new NightmareEngine();
                // Kezdőpont a fű felett (X: 100, Y: 300)
                window.game.player.x = 100;
                window.game.player.y = 300;
                console.log("Sector 01 Initialized.");
            } catch (e) {
                document.getElementById('status').innerText = "ERROR";
                console.error(e);
            }
        };
    </script>
</body>
</html>
