<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Gravity Glitch - Sector 01</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        #status-ui { 
            position: absolute; top: 10px; left: 10px; 
            color: #0f0; font-family: monospace; z-index: 100; 
        }
    </style>
</head>
<body>
    <div id="status-ui">SYSTEM_STATUS: <span id="status">INIT...</span></div>
    <canvas id="gameCanvas"></canvas>

    <script src="js/levels.js"></script>
    <script src="js/input.js"></script>
    <script src="js/engine/physics.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>

    <script>
        window.onload = () => {
            try {
                window.game = new NightmareEngine();
                document.getElementById('status').innerText = "RUNNING";
                
                const grassImg = new Image();
                // Base64 textúra a CORS hibák ellen
                grassImg.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEUAAAAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpAyWpB2un0sAAAAG3RSTlMAERITFBUWFxgZGhscHR4fICEiIyQlJicoKSor9pZ9CgAAAGVJREFUeNrt07ENwDAMA0EL6f7Lp0uHAnmBA9yByAtS6pXWujZ6Z9Z656z17vTP7PTv9I/07/SP9I/07/SP9I/0y8vLy8vLy8vLy8vLy8vLy8vLy8vLy8vLy8vLy8vLy8vLy8vLy/v1By7mAnm9UksMAAAAAElFTkSuQmCC";

                // Renderer felülírása a biztonságos képrajzoláshoz
                window.game.renderer.drawMap = function(map, camera) {
                    const tileSize = 50;
                    if (!map) return;
                    for (let r = 0; r < map.length; r++) {
                        for (let c = 0; c < map[r].length; c++) {
                            if (map[r][c] === 1) {
                                // Csak akkor rajzolunk, ha a kép nem "törött"
                                if (grassImg.complete && grassImg.naturalWidth !== 0) {
                                    this.ctx.drawImage(grassImg, c * tileSize, r * tileSize, tileSize, tileSize);
                                } else {
                                    this.ctx.fillStyle = "#2d5a27";
                                    this.ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                                }
                            }
                        }
                    }
                };

                // Játékos kezdőpozíciója a fű felett
                window.game.player.x = 100;
                window.game.player.y = 300;

            } catch (e) {
                document.getElementById('status').innerText = "FATAL ERROR";
                console.error("Initialization failed:", e);
            }
        };
    </script>
</body>
</html>
