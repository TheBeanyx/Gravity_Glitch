<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Gravity Glitch - Sector 01</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script src="js/levels.js"></script>
    <script src="js/input.js"></script>
    <script src="js/engine/physics.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>

    <script>
        window.onload = () => {
            try {
                window.game = new NightmareEngine();
                
                // JAVÍTOTT KEZDŐPONT: 
                // X: 50 (pálya széle), Y: 400 (a 6. sor magassága felett)
                window.game.player.x = 50;
                window.game.player.y = 400; 
                window.game.player.vy = 0;
                
                console.log("Sector 01: Final calibration. Player dropped on grass.");
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
