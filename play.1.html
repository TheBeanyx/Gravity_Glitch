<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Gravity Glitch - Sector 01</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script src="js/levels.js"></script>
    <script src="js/input.js"></script>
    <script src="js/engine/physics.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>

    <script>
        window.onload = () => {
            try {
                window.game = new NightmareEngine();
                
                // Beállítjuk a játékost a nagyított fű fölé
                // (8. sor * 80px = 640px, tehát 550 körül jó lesz)
                window.game.player.x = 100;
                window.game.player.y = 500;
                
                console.log("Sector 01: High Definition Grass Active.");
            } catch (e) {
                console.error("Critical System Failure:", e);
            }
        };
    </script>
</body>
</html>
